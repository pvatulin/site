<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PV</title>
  <style>
    :root { --bg: #fff; --size: 480px; }
    
    html, body { height: 100%; margin: 0; background: var(--bg); }
    
    .center { height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .avatar { width: var(--size); height: var(--size); border-radius: 50%; overflow: hidden; display: grid; place-items: center; background: #fff; border: 1px solid #e2e8f0; }
    .avatar img { width: 100%; height: 100%; object-fit: contain; display: block; user-select: none; -webkit-user-drag: none; pointer-events: none; }
    
    .apps-bar { margin-top: 28px; padding: 18px 24px; display: flex; justify-content: center; gap: 20px; background: #fff; border: 1px solid #e2e8f0; border-radius: 24px; }
    .app img { width: 72px; height: 72px; border-radius: 22%; display: block; cursor: pointer; transition: transform .2s ease; }
    .app:hover img { transform: scale(1.08); }

    .theme { position: fixed; right: 12px; top: 12px; }
    .theme button { width: 38px; height: 38px; border: 1px solid #cbd5e1; background: #fff; border-radius: 8px; cursor: pointer; font-size: 20px; padding: 0; }
    .theme button:hover { background: #f8fafc; border-color: #0f172a; }

    body.dark { background: #0f172a; color: #f8fafc; }
    body.dark .avatar { background: #1e293b; border-color: #334155; }
    body.dark .apps-bar { background: #1e293b; border-color: #334155; }
    body.dark .theme button { background: #1e293b; color: #f8fafc; border-color: #334155; }
    body.dark .theme button:hover { background: #334155; border-color: #334155; }
    
  </style>
</head>
<body>
  <div class="theme"><button id="btn-theme" onclick="toggleTheme()">🌙</button></div>
  
  <div class="center">
    <div class="avatar" aria-label="Logo">
      <img src="assets/developer.png" alt="Logo">
    </div>

    <div class="apps-bar">
      <a href="checklist/" class="app"><img src="checklist/assets/_checklist_icon.png" alt="CheckList"></a>
      <a href="plansboard/" class="app"><img src="plansboard/assets/_plansboard_icon.png" alt="PlansBoard"></a>
    </div>
  </div>

  <script>
  function toggleTheme() {
    document.body.classList.toggle('dark');
    const dark = document.body.classList.contains('dark');
    document.getElementById('btn-theme').textContent = dark ? '☀️' : '🌙';
    localStorage.setItem('theme', dark ? 'dark' : 'light');
  }
  
  if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark');
    document.getElementById('btn-theme').textContent = '☀️';
  }
  </script>
</body>
</html>
