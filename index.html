<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PV</title>
  <style>
    :root {
      /* --bg: #0f1115;          очень тёмно-серый фон */
      --bg: #0b0b0b;
      --size: 480px;          /* размер “аватара” (круга) */
      --zoom: 2;              /* 200% */
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
    }

    .center {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* Круг-аватар: ровное обрезание по кругу */
    .avatar {
      width: var(--size);
      height: var(--size);
      border-radius: 50%;
      overflow: hidden;
      display: grid;
      place-items: center;
      
      background: #141414; /* фон круга — светлее страницы */
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    /* Масштабируем логотип на 200% внутри круга */
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .apps-bar {
      margin-top: 28px;
      padding: 18px 24px;
      display: flex;
      justify-content: center;
      gap: 20px;
      background: rgba(20,20,20,.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 24px;
    }
    
    .app img {
      width: 72px;
      height: 72px;
      border-radius: 22%;
      display: block;
      transition: transform .2s;
      cursor: pointer;
    }
    
    .app:hover img {
      transform: scale(1.08);
    }
  </style>
</head>
<body>
  <div class="center">
    <div class="avatar" aria-label="Logo">
      <img src="assets/developer.png" alt="Logo">
    </div>

    <div class="apps-bar">
      <a href="checklist/" class="app"><img src="checklist/assets/_checklist_icon.png" alt="CheckList"></a>
      <a href="plansboard/" class="app"><img src="plansboard/assets/_plansboard_icon.png" alt="PlansBoard"></a>
    </div>
  </div>
</body>
</html>
