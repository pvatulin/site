<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="app.title"></title>
  <meta name="description" content="App landing page with RU/EN switch (no reload).">
  <style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; margin:0; color:#0f172a; }
  header { padding: 56px 24px; text-align:center; background: #f8fafc; position: relative; }
  h1 { font-size: 40px; margin: 0 0 8px; }
  p.lead { font-size: 18px; margin: 0 auto 20px; max-width: 720px; color:#334155; }
  .btn { display:inline-block; padding:12px 16px; margin:8px; border-radius:10px; text-decoration:none; border:1px solid #0f172a; }
  .btn.primary { background:#0f172a; color:#fff; }
  .container { max-width: 980px; margin: 0 auto; padding: 24px; }
  .features { display:grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap:16px; }
  .card { border:1px solid #e2e8f0; border-radius:14px; padding:16px; background:#fff; }
  .screens-wrap { position:relative; }
  .screenshots { display:flex; gap:12px; margin-top:12px; overflow-x:auto; scroll-behavior:smooth; }
  .screenshots img { width:260px; flex:0 0 auto; border-radius:14px; border:1px solid #e2e8f0; }
  .screen-arrow { position:absolute; top:50%; transform:translateY(-50%); width:38px; height:38px; border:1px solid #cbd5e1; background:#fff; border-radius:8px; cursor:pointer; padding:0; font-size:20px; line-height:1; }
  .screen-arrow.left { left:-12px; }
  .screen-arrow.right { right:-12px; }
  footer { text-align:center; color:#64748b; padding:32px 24px; }
  nav a { margin: 0 8px; color:#0f172a; }
  body.dark { background:#0f172a; color:#f8fafc; }
  body.dark header { background:#1e293b; }
  body.dark p, body.dark p.lead, body.dark footer { color:#cbd5e1; }
  body.dark .card, body.dark .apps-menu, body.dark .apps button, body.dark .theme button, body.dark .lang button, body.dark .screen-arrow { background:#1e293b; color:#f8fafc; border-color:#334155; }
  body.dark nav a, body.dark a { color:#f8fafc; }
  body.dark .lang button.active { background:#334155; color:#f8fafc; border-color:#334155; }
  body.dark .apps button:hover { background:#334155; color:#f8fafc; border-color:#334155; }
  body.dark .apps-menu a:hover { background:#334155; }
  body.dark .theme button:hover { background:#334155; color:#f8fafc; border-color:#334155; }
  .apps { position: absolute; left: 12px; top: 12px; }
  .apps button { width:38px; height:38px; border:1px solid #cbd5e1; background:#fff; border-radius:8px; cursor:pointer; font-size:24px; line-height:1; padding:0; }
  .apps button:hover { background:#f8fafc; border-color:#0f172a; }
  .apps-menu { display:none; position:absolute; left:0; top:48px; background:#fff; border:1px solid #e2e8f0; border-radius:10px; overflow:hidden; min-width:150px; box-shadow:0 4px 12px rgba(15,23,42,0.12); }
  .apps-menu a { display:flex; align-items:center; gap:10px; padding:7px 12px; color:#0f172a; text-decoration:none; white-space:nowrap; }
  .apps-menu img { width:32px; height:32px; border-radius:22%; flex-shrink:0; }
  .apps-menu a:hover { background:#f8fafc; }
  .apps.open .apps-menu { display:block; }
  .theme { position: absolute; right: 120px; top: 12px; }
  .theme button { width:38px; height:38px; border:1px solid #cbd5e1; background:#fff; border-radius:8px; cursor:pointer; font-size:20px; padding:0; }
  .theme button:hover { background:#f8fafc; border-color:#0f172a; }
  .lang { position: absolute; right: 12px; top: 12px; display:flex; gap:8px; }
  .lang button { width:38px; height:38px; border:1px solid #cbd5e1; background:#fff; border-radius:8px; cursor:pointer; padding:0; }
  .lang button.active { background:#0f172a; color:#fff; border-color:#0f172a; }
  .section { margin: 16px 0; }
  .content { max-width: 820px; margin: 0 auto; }

  
  .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, .65); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; z-index: 9999; }
  .overlay-box { max-width: 520px; margin: 24px; padding: 32px; background: #fff; border: 1px solid #e2e8f0; border-radius: 20px; text-align: center; }
  .overlay-box h1 { margin: 0 0 20px; font-size: 36px; }
  body.dark .overlay-box { background: #1e293b; border-color: #334155; }

  
</style>
</head>
<body>
  
  <div class="overlay">
    <div class="overlay-box">
      <h1>🚧 Under Construction</h1>
    </div>
  </div>
  
  <header>
    <div class="apps">
      <button onclick="toggleApps()">☰</button>
      <div class="apps-menu">
        <a href="../checklist/"><img src="../checklist/assets/_checklist_icon.png" alt="">CheckList</a>
        <a href="../plansboard/"><img src="../plansboard/assets/_plansboard_icon.png" alt="">PlansBoard</a>
      </div>
    </div>
    
    <div class="theme">
      <button id="btn-theme" onclick="toggleTheme()">🌙</button>
    </div>
    
    <div class="lang">
      <button id="btn-en" onclick="setLang('en')">EN</button>
      <button id="btn-ru" onclick="setLang('ru')">RU</button>
    </div>
    <img src="assets/_plansboard_icon.png" alt="App icon" width="96" height="96" style="border-radius:22%; border:1px solid #e2e8f0;">
    <h1 data-i18n="app.title"></h1>
    <p class="lead" data-i18n="app.lead"></p>
    <div>
      <a class="btn primary" href="https://apps.apple.com/app/idXXXXXXXXX" data-i18n="btn.download"></a>
      <a class="btn" href="#features" data-i18n="btn.features"></a>
    </div>
    <nav style="margin-top:8px;">
      <a href="#screens" data-i18n="nav.screens"></a> ·
      <a href="#support" data-i18n="nav.support"></a> ·
      <a href="privacy.html" data-i18n="nav.privacy"></a>
    </nav>
  </header>

  <main class="container content">
    <section id="features" class="section">
      <h2 data-i18n="features.title"></h2>
      <div class="features">
        <div class="card"><strong data-i18n="feat.1"></strong></div>
        <div class="card"><strong data-i18n="feat.2"></strong></div>
        <div class="card"><strong data-i18n="feat.3"></strong></div>
      </div>
    </section>

    <section id="screens" class="section">
      <h2 data-i18n="screens.title"></h2>
      <p data-i18n="screens.note"></p>
      <div class="screens-wrap">
        <button class="screen-arrow left" onclick="scrollScreens(-1)">‹</button>
        <div class="screenshots" id="screenshots">
          <img id="screen1" src="assets/plansboard_ru_1.png" alt="Screenshot 1">
          <img id="screen2" src="assets/plansboard_ru_2.png" alt="Screenshot 2">
          <img id="screen3" src="assets/plansboard_ru_3.png" alt="Screenshot 3">
          <img id="screen4" src="assets/plansboard_ru_4.png" alt="Screenshot 4">
        </div>
        <button class="screen-arrow right" onclick="scrollScreens(1)">›</button>
      </div>
    </section>

    <section id="support" class="section">
      <h2 data-i18n="support.title"></h2>
      <p><span data-i18n="support.telegram"></span> <a href="https://t.me/plansboardapp" target="_blank">@plansboardapp</a></p>
      <p><span data-i18n="support.text"></span> <a href="mailto:pvatulin.dev@gmail.com">pvatulin.dev@gmail.com</a></p>
    </section>
  </main>

  <footer>
    <small><span data-i18n="footer.copy"></span> · <a href="privacy.html" data-i18n="nav.privacy"></a></small>
  </footer>

  
<script>
  const i18n = {
    ru: {
      'app.title':'PlansBoard',
      'app.lead':'Легкое и функциональное приложение приложение для планирования.',
      'btn.download':'Скачать в App Store',
      'btn.features':'Особенности',
      'nav.screens':'Скриншоты',
      'nav.support':'Поддержка',
      'nav.privacy':'Политика конфиденциальности',
      'features.title':'Особенности',
      'feat.1':'Функция 1. Короткое описание.',
      'feat.2':'Функция 2. Короткое описание.',
      'feat.3':'Функция 3. Короткое описание.',
      'screens.title':'Скриншоты',
      'screens.note':'Замените изображения в папке assets на реальные скриншоты.',
      'support.title':'Поддержка',
      'support.telegram':'Наш Telegram-канал:',
      'support.text':'Вопросы и помощь:',
      'footer.copy':'© 2026 Pavel Vatulin'
    },
    en: {
      'app.title':'PlansBoard',
      'app.lead':'A brief description of the app and its key benefits.',
      'btn.download':'Download on the App Store',
      'btn.features':'Features',
      'nav.screens':'Screenshots',
      'nav.support':'Support',
      'nav.privacy':'Privacy Policy',
      'features.title':'Features',
      'feat.1':'Feature 1. Short description.',
      'feat.2':'Feature 2. Short description.',
      'feat.3':'Feature 3. Short description.',
      'screens.title':'Screenshots',
      'screens.note':'Replace the images in the assets folder with your actual screenshots.',
      'support.title':'Support',
      'support.telegram':'Our Telegram channel:',
      'support.text':'Contact us:',
      'footer.copy':'© 2026 Pavel Vatulin'
    }
  };

  function toggleTheme() {
    document.body.classList.toggle('dark');
    const dark = document.body.classList.contains('dark');
    document.getElementById('btn-theme').textContent = dark ? '☀️' : '🌙';
    localStorage.setItem('theme', dark ? 'dark' : 'light');
  }
  
  function scrollScreens(direction) {
    const box = document.getElementById('screenshots');
    if (box) box.scrollBy({ left: direction * 280, behavior: 'smooth' });
  }
  
  function toggleApps() {
    document.querySelector('.apps').classList.toggle('open');
  }

  document.addEventListener('click', (e) => {
    const apps = document.querySelector('.apps');
    if (!apps.contains(e.target)) {
      apps.classList.remove('open');
    }
  });
  
  function setLang(lang) {
    localStorage.setItem('lang', lang);
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      const text = i18n[lang][key];
      if (text !== undefined) el.textContent = text;
    });
    document.querySelectorAll('.lang button').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById('btn-' + lang);
    if (btn) btn.classList.add('active');
    
    for (let i = 1; i <= 4; i++) {
      const screen = document.getElementById('screen' + i);
      if (screen) screen.src = `assets/plansboard_${lang}_${i}.png`;
    }
  }

  function initLang(defaultLang='ru') {
    const stored = localStorage.getItem('lang');
    setLang(stored || defaultLang);

    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
      document.getElementById('btn-theme').textContent = '☀️';
    }
  }

  document.addEventListener('DOMContentLoaded', () => initLang('ru'));
</script>

</body>
</html>
