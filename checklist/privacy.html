<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="privacy.title"></title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; margin: 24px; color:#0f172a; }
    h1 { font-size: 28px; }
    h2 { margin-top: 20px; font-size: 20px; }
    p { color:#334155; line-height: 1.6; }
    body.dark { background:#0f172a; color:#f8fafc; }
    body.dark p { color:#cbd5e1; }
    body.dark h1, body.dark h2 { color:#f8fafc; }
    body.dark a { color:#f8fafc; }
    body.dark .back button, body.dark .lang button { background:#1e293b; color:#f8fafc; border-color:#334155; }
    body.dark .lang button.active { background:#334155; color:#f8fafc; border-color:#334155; }
    body.dark .back button:hover { background:#334155; color:#f8fafc; border-color:#334155; }
    body.dark .theme button { background:#1e293b; color:#f8fafc; border-color:#334155; }
    body.dark .theme button:hover { background:#334155; color:#f8fafc; border-color:#334155; }
    .back { position: fixed; left: 12px; top: 12px; }
    .back button { width:38px; height:38px; border:1px solid #cbd5e1; background:#fff; border-radius:8px; cursor:pointer; font-size:20px; line-height:1; padding:0; }
    .back button:hover { background:#f8fafc; border-color:#0f172a; }
    .theme { position: fixed; right: 120px; top: 12px; }
    .theme button { width:38px; height:38px; border:1px solid #cbd5e1; background:#fff; border-radius:8px; cursor:pointer; font-size:20px; padding:0; }
    .theme button:hover { background:#f8fafc; border-color:#0f172a; }
    .lang { position: fixed; right: 12px; top: 12px; display:flex; gap:8px; }
    .lang button { width:38px; height:38px; border:1px solid #cbd5e1; background:#fff; border-radius:8px; cursor:pointer; font-size:15px; line-height:1; padding:0; }
    .lang button.active { background:#0f172a; color:#fff; border-color:#0f172a; }
    .content { max-width: 820px; margin: 0 auto; padding-top: 48px; }
  </style>
</head>
<body>
  <div class="back">
    <button onclick="location.href='index.html'">←</button>
  </div>

  <div class="theme">
    <button id="btn-theme" onclick="toggleTheme()">🌙</button>
  </div>
  
  <div class="lang">
    <button id="btn-en" onclick="setLang('en')">EN</button>
    <button id="btn-ru" onclick="setLang('ru')">RU</button>
  </div>

  <main class="content">
    <h1 data-i18n="privacy.title"></h1>
    <p data-i18n="privacy.effective"></p>

    <h2 data-i18n="p.intro.h2"></h2>
    <p data-i18n="p.intro.p"></p>

    <h2 data-i18n="p.scope.h2"></h2>
    <p data-i18n="p.scope.p"></p>

    <h2 data-i18n="p.use.h2"></h2>
    <p data-i18n="p.use.p"></p>

    <h2 data-i18n="p.storage.h2"></h2>
    <p data-i18n="p.storage.p"></p>

    <h2 data-i18n="p.share.h2"></h2>
    <p data-i18n="p.share.p"></p>

    <h2 data-i18n="p.rights.h2"></h2>
    <p data-i18n="p.rights.p"></p>

    <h2 data-i18n="p.age.h2"></h2>
    <p data-i18n="p.age.p"></p>

    <h2 data-i18n="p.changes.h2"></h2>
    <p data-i18n="p.changes.p"></p>

    <h2 data-i18n="p.contact.h2"></h2>
    <p><span data-i18n="p.contact.p"></span> <a href="mailto:pvatulin.dev@gmail.com">pvatulin.dev@gmail.com</a></p>

    <p><a href="index.html" data-i18n="privacy.back"></a></p>
  </main>

  
<script>
  const i18n = {
    ru: {
      'privacy.title':'CheckList • Политика конфиденциальности',
      'privacy.effective':'Дата вступления в силу: 2026-06-01',
      'p.intro.h2':'1. Введение',
      'p.intro.p':'Настоящая Политика конфиденциальности описывает, как CheckList (далее — «Приложение») обрабатывает данные пользователей.',
      'p.scope.h2':'2. Собираемая информация',
      'p.scope.p':'Приложение не собирает, не хранит, не передает и не обрабатывает персональные данные пользователей. Мы также не используем файлы cookie, аналитику, рекламные технологии и сторонние SDK/сервисы, способные собирать информацию о вас.',
      'p.use.h2':'3. Использование информации',
      'p.use.p':'Поскольку данные не собираются, мы не используем их ни для каких целей.',
      'p.storage.h2':'4. Хранение данных',
      'p.storage.p':'Мы не осуществляем хранение персональных данных.',
      'p.share.h2':'5. Передача третьим лицам',
      'p.share.p':'Мы не передаем ваши данные третьим лицам, поскольку данные не собираются.',
      'p.rights.h2':'6. Права пользователя',
      'p.rights.p':'Если у вас есть вопросы, связанные с конфиденциальностью, вы можете связаться с нами.',
      'p.age.h2':'7. Возрастные ограничения',
      'p.age.p':'Приложение не имеет возрастных ограничений.',
      'p.changes.h2':'8. Изменения политики',
      'p.changes.p':'Мы можем обновлять Политику конфиденциальности. Новая версия вступает в силу с момента публикации на странице приложения.',
      'p.contact.h2':'9. Контакты',
      'p.contact.p':'По вопросам конфиденциальности свяжитесь с нами:',
      'privacy.back':'Вернуться на страницу приложения'
    },
    en: {
      'privacy.title':'CheckList • Privacy Policy',
      'privacy.effective':'Effective date: 2026-06-01',
      'p.intro.h2':'1. Introduction',
      'p.intro.p':'This Privacy Policy describes how CheckList (the “App”) processes user data.',
      'p.scope.h2':'2. Information We Collect',
      'p.scope.p':'The App does not collect, store, transmit, or process any personal data. We also do not use cookies, analytics, advertising technologies, or third-party SDKs/services that could collect information about you.',
      'p.use.h2':'3. How We Use Information',
      'p.use.p':'Because no data is collected, there is no processing for any purpose.',
      'p.storage.h2':'4. Data Storage',
      'p.storage.p':'We do not store personal data.',
      'p.share.h2':'5. Sharing with Third Parties',
      'p.share.p':'We do not share your data with third parties, as no data is collected.',
      'p.rights.h2':'6. Your Rights',
      'p.rights.p':'If you have privacy-related questions, you can contact us.',
      'p.age.h2':'7. Age Restrictions',
      'p.age.p':'The App has no age restrictions.',
      'p.changes.h2':'8. Changes to This Policy',
      'p.changes.p':'We may update this Policy from time to time. The updated version becomes effective when published on the app page.',
      'p.contact.h2':'9. Contact',
      'p.contact.p':'For privacy inquiries, please contact:',
      'privacy.back':'Back to the app page'
    }
  };

  function toggleTheme() {
    document.body.classList.toggle('dark');
    const dark = document.body.classList.contains('dark');
    document.getElementById('btn-theme').textContent = dark ? '☀️' : '🌙';
    localStorage.setItem('theme', dark ? 'dark' : 'light');
  }
  
  function setLang(lang) {
    localStorage.setItem('lang', lang);
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      const text = i18n[lang][key];
      if (text !== undefined) el.textContent = text;
    });
    document.querySelectorAll('.lang button').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById('btn-' + lang);
    if (btn) btn.classList.add('active');
  }

  function initLang(defaultLang='ru') {
    const stored = localStorage.getItem('lang');
    setLang(stored || defaultLang);

    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
      document.getElementById('btn-theme').textContent = '☀️';
    }
  }

  document.addEventListener('DOMContentLoaded', () => initLang('ru'));
</script>

</body>
</html>
