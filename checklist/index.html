<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="app.title"></title>
  <meta name="description" content="CheckList — приложение для списков покупок, путешествий, задач и напоминаний с каталогом более 1000 готовых элементов.">
  <style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; margin:0; color:#0f172a; }
  header { padding: 56px 24px 48px; text-align:center; background: #f8fafc; position: relative; }
  h1 { font-size: 40px; margin: 0 0 8px; }
  p.lead { font-size: 18px; margin: 0 auto 20px; max-width: 720px; color:#334155; }
  .btn { display:inline-block; padding:12px 16px; margin:8px; border-radius:10px; text-decoration:none; border:1px solid #0f172a; }
  .btn.primary { background:#0f172a; color:#fff; }
  .container { max-width: 980px; margin: 0 auto; padding: 8px 24px 24px 24px; }
  .features-wrap { position:relative; }
  .features { display:flex; gap:16px; overflow-x:auto; scroll-behavior:smooth; }
  .features .card { flex:0 0 calc((100% - 32px) / 3); box-sizing:border-box; }
  @media (max-width: 700px) { .features .card { flex-basis:85%; } }
  .card { border:1px solid #e2e8f0; border-radius:14px; padding:16px; background:#fff; }
  .card strong { display:block; margin-bottom:6px; }
  .card p { margin:0; color:#334155; line-height:1.4; }
  body.dark .card p { color:#cbd5e1; }
  .overview-subtitle { font-size: 1.25em; font-weight: 700; margin: 24px 0 12px; }
  .overview-text { line-height:1.6; }
  .overview-gap { display: block; height: 12px; }
  .screens-wrap { position:relative; }
  .screenshots { display:flex; gap:12px; margin-top:12px; overflow-x:auto; scroll-behavior:smooth; }
  .screenshots img { width:260px; flex:0 0 auto; border-radius:14px; border:1px solid #e2e8f0; }
  .screen-arrow { position:absolute; top:50%; transform:translateY(-50%); width:38px; height:38px; border:1px solid #cbd5e1; background:#fff; border-radius:8px; cursor:pointer; padding:0; font-size:20px; line-height:1; }
  .screen-arrow.left { left:-12px; }
  .screen-arrow.right { right:-12px; }
  footer { text-align:center; color:#64748b; padding:32px 24px; }
  nav a { margin: 0 8px; color:#0f172a; }
  body.dark { background:#0f172a; color:#f8fafc; }
  body.dark header { background:#1e293b; }
  body.dark p, body.dark p.lead, body.dark footer { color:#cbd5e1; }
  body.dark .card, body.dark .apps-menu, body.dark .apps button, body.dark .theme button, body.dark .lang button, body.dark .screen-arrow { background:#1e293b; color:#f8fafc; border-color:#334155; }
  body.dark nav a, body.dark a { color:#f8fafc; }
  body.dark .lang button.active { background:#334155; color:#f8fafc; border-color:#334155; }
  body.dark .apps button:hover { background:#334155; color:#f8fafc; border-color:#334155; }
  body.dark .apps-menu a:hover { background:#334155; }
  body.dark .theme button:hover { background:#334155; color:#f8fafc; border-color:#334155; }
  .apps { position: absolute; left: 12px; top: 12px; }
  .apps button { width:38px; height:38px; border:1px solid #cbd5e1; background:#fff; border-radius:8px; cursor:pointer; font-size:24px; line-height:1; padding:0; }
  .apps button:hover { background:#f8fafc; border-color:#0f172a; }
  .apps-menu { display:none; position:absolute; left:0; top:48px; background:#fff; border:1px solid #e2e8f0; border-radius:10px; overflow:hidden; min-width:150px; box-shadow:0 4px 12px rgba(15,23,42,0.12); }
  .apps-menu a { display:flex; align-items:center; gap:10px; padding:7px 12px; color:#0f172a; text-decoration:none; white-space:nowrap; }
  .apps-menu img { width:32px; height:32px; border-radius:22%; flex-shrink:0; }
  .apps-menu a:hover { background:#f8fafc; }
  .apps.open .apps-menu { display:block; }
  .theme { position: absolute; right: 120px; top: 12px; }
  .theme button { width:38px; height:38px; border:1px solid #cbd5e1; background:#fff; border-radius:8px; cursor:pointer; font-size:20px; padding:0; }
  .theme button:hover { background:#f8fafc; border-color:#0f172a; }
  .lang { position: absolute; right: 12px; top: 12px; display:flex; gap:8px; }
  .lang button { width:38px; height:38px; border:1px solid #cbd5e1; background:#fff; border-radius:8px; cursor:pointer; padding:0; }
  .lang button.active { background:#0f172a; color:#fff; border-color:#0f172a; }
  .section { margin: 16px 0; }
  .content { max-width: 820px; margin: 0 auto; }
</style>
</head>
<body>

          <div class="card"><strong data-i18n="feat.2.title"></strong><p data-i18n="feat.2.text"></p></div>
          <div class="card"><strong data-i18n="feat.3.title"></strong><p data-i18n="feat.3.text"></p></div>
          <div class="card"><strong data-i18n="feat.4.title"></strong><p data-i18n="feat.4.text"></p></div>
          <div class="card"><strong data-i18n="feat.5.title"></strong><p data-i18n="feat.5.text"></p></div>
          <div class="card"><strong data-i18n="feat.6.title"></strong><p data-i18n="feat.6.text"></p></div>

        <button class="screen-arrow right" onclick="scrollFeatures(1)">›</button>
      </div>
    </section>

    <section id="screens" class="section">

          <img id="screen8" src="assets/checklist_ru_8.png" alt="Screenshot 8">
          <img id="screen9" src="assets/checklist_ru_9.png" alt="Screenshot 9">
          <img id="screen10" src="assets/checklist_ru_10.png" alt="Screenshot 10">
        </div>
        <button class="screen-arrow right" onclick="scrollScreens(1)">›</button>

    </section>

    <section id="overview" class="section">
      <h2 data-i18n="overview.title"></h2>
      <p class="overview-text" data-i18n="overview.text1"></p>
      <p class="overview-subtitle" data-i18n="overview.subtitle"></p>
      <p class="overview-text" data-i18n="overview.text2"></p>
      <p class="overview-text" data-i18n="overview.text3"></p>
    </section>

    <section id="support" class="section">
      <h2 data-i18n="support.title"></h2>
      <p><span data-i18n="support.telegram"></span> <a href="https://t.me/checklistapp" target="_blank">@checklistapp</a></p>
      <p><span data-i18n="support.text"></span> <a href="mailto:pvatulin.dev@gmail.com">pvatulin.dev@gmail.com</a></p>
    </section>
  </main>

  <footer>
    <small><span data-i18n="footer.copy"></span> · <a href="privacy.html" data-i18n="nav.privacy"></a></small>
  </footer>

      'overview.subtitle':'Основные возможности:',
      'overview.text2':'• Интерфейс программы переведён на 20 языков.<br>• Готовый каталог 1000+ элементов с онлайн-обновлением.<br>• Каталог составлен на 9 языках и продолжает расти.<br>• Синхронизация между всеми устройствами через iCloud.<br>• Неограниченное количество списков и элементов.<br>• Быстрое переключение между всеми списками.<br>• Цветовые метки для элементов списка и каталога.<br>• Индикатор прогресса выполнения каждого списка.<br>• Быстрое добавление в список по первым буквам.<br>• Настраиваемый поиск по совпадению в каталоге.<br>• Ручное изменение порядка элементов перетаскиванием.<br>• Быстрый выбор цвета нажатием на цветовую метку.<br>• Указание количества для каждого элемента списка.<br>• Напоминания для пунктов списка с удобным управлением.<br>• Защита отдельных пунктов от случайных изменений.<br>• Перегруппировка элементов списка по разным критериям.<br>• Перенос завершённых списков и категорий в историю.<br>• Удобный поиск по истории и повторное добавление.<br>• Возможность быстро поделиться списком с близкими.<br>• Быстрые действия одним касанием и жестами.<br>• Выполнение пунктов списка двойным касанием.<br>• Постоянные списки и списки для разовых задач.<br>• Индивидуальные настройки для каждого списка.<br>• Выбор категорий каталога для каждого списка.<br>• Внешний вид списков настраивается индивидуально.<br>• Защита отдельных списков от случайного удаления.<br>• Создание собственных элементов и категорий.<br>• Поиск по каталогу внутри выбранной категории.<br>• Массовое добавление в каталог через разделитель.<br>• Режим одновременного наполнения списка и каталога.<br>• Автоматическая раскраска готового онлайн-каталога.<br>• Смена иконки приложения под разные задачи.<br>• Настройка темы оформления, цветов и градиентов.<br>• Контроль целостности каталога и поиск дубликатов.<br>• Тонкая настройка приложения под ваши задачи.<br>• Подсказки в настройках и обучающий тур.',
      'overview.text3':'Пользуйтесь приложением с удовольствием, а я продолжу развивать его, добавлять новые возможности и совершенствовать каталог, прислушиваясь к вашим отзывам и пожеланиям. Если CheckList станет полезным помощником для вас или хотя бы немного упростит ваши повседневные задачи, значит вся моя работа была проделана не зря.',
      'support.title':'Поддержка',

      'app.title':'CheckList',

      'btn.overview':'Overview',
      'nav.screens':'Screenshots',
      'nav.support':'Support',
      'nav.privacy':'Privacy Policy',

      'feat.1.title':'Catalog 1000+',

      'feat.2.title':'Quick Add',
      'feat.2.text':'Add items in seconds by the first letters.',
      'feat.3.title':'Reminders',
      'feat.3.text':'Set reminders for any tasks or list items.',
      'feat.4.title':'iCloud Sync',
      'feat.4.text':'Sync across all your devices with iCloud.',

      'feat.5.text':'Intuitive controls with taps, swipes and gestures.',
      'feat.6.title':'History',

      'screens.title':'Screenshots',
      'overview.title':'Overview',
      'overview.text1':'CheckList is a versatile app for creating all kinds of lists. Plan your shopping, pack for trips, organize household chores, work tasks, ideas, celebrations, recipes, pantry supplies, renovations, moving, and much more. Create your own lists from scratch or use the ready-made online catalog with 1000+ items, conveniently organized into categories.<gap>Add items in seconds by typing just the first few letters, rearrange them with simple drag and drop, set reminders, and mark items as completed with a double tap. Keep everything important in one place and reuse lists from your history to save time on recurring tasks. Build your own catalog of frequently used items, add them individually or in bulk, organize them into categories, and label them with colors. Customize the app to match your needs and preferences by choosing interface colors, icons, and many other settings.<gap>Simplicity and ease of use are at the core of CheckList’s design. Almost every action can be performed with simple gestures, a single tap, or a swipe, without complicated menus or unnecessary confirmations. Every feature is designed to make creating, editing, and managing lists fast, intuitive, and convenient for both everyday tasks and long-term planning.',
      'overview.subtitle':'Key Features:',
      'overview.text2':'• The app interface is available in 20 languages.<br>• Ready-made catalog with 1000+ items and online updates.<br>• The catalog is available in 9 languages and continues to grow.<br>• Sync across all your devices with iCloud.<br>• Unlimited lists and items.<br>• Quickly switch between all your lists.<br>• Color labels for list items and catalog entries.<br>• Progress indicator for every list.<br>• Fast item search by the first few letters.<br>• Flexible catalog search by prefix or partial match.<br>• Manually reorder items with drag and drop.<br>• Quick color selection by tapping the color label.<br>• Set quantities for individual list items.<br>• Reminders for list items with easy management.<br>• Protect individual items from accidental changes.<br>• Regroup list items using different criteria.<br>• History archiving for completed lists and categories.<br>• Convenient history search and quick re-adding.<br>• Quickly share lists with family and friends.<br>• Fast actions with a single tap or gestures.<br>• Mark items as done with a double tap.<br>• Support for one-time and reusable lists.<br>• Individual settings for every list.<br>• Choose catalog categories for each list individually.<br>• Customize the appearance of every list.<br>• Protect individual lists from accidental deletion.<br>• Create your own items and categories.<br>• Search the catalog within a selected category.<br>• Bulk add items to the catalog using a separator.<br>• Simultaneously add items to both the list and the catalog.<br>• Automatic color labeling for the ready-made online catalog.<br>• Change the app icon to match your needs.<br>• Customize themes, colors, and gradients.<br>• Check catalog integrity and detect duplicates.<br>• Fine-tune the app to fit your needs.<br>• Built-in settings tips and a guided tour.',
      'overview.text3':'Enjoy using the app, and I’ll keep improving it, adding new features and refining the catalog while listening to your feedback and suggestions. If CheckList becomes a helpful companion for you or simply makes your everyday tasks a little easier, then all my hard work will have been worth it.',

  function toggleTheme() {
    document.body.classList.toggle('dark');
    const dark = document.body.classList.contains('dark');
    document.getElementById('btn-theme').textContent = dark ? '☀️' : '🌙';
    localStorage.setItem('theme', dark ? 'dark' : 'light');
  }

  function scrollFeatures(direction) {
    const box = document.getElementById('features-list');
    const card = box ? box.querySelector('.card') : null;
    if (box && card) box.scrollBy({ left: direction * (card.offsetWidth + 16), behavior: 'smooth' });
  }
  
  function scrollScreens(direction) {
    const box = document.getElementById('screenshots');
    const img = box ? box.querySelector('img') : null;
    if (box && img) box.scrollBy({ left: direction * (img.offsetWidth + 12), behavior: 'smooth' });
  }
  
  function toggleApps() {
    document.querySelector('.apps').classList.toggle('open');
  }

  document.addEventListener('click', (e) => {
    const apps = document.querySelector('.apps');
    if (!apps.contains(e.target)) {
      apps.classList.remove('open');
    }
  });
  
  function setLang(lang) {
    localStorage.setItem('lang', lang);
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      const text = i18n[lang][key];
      
      if (text !== undefined) {
        if (el.classList.contains('overview-text')) {
          el.innerHTML = text
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('&lt;br&gt;', '<br>')
            .replaceAll('&lt;gap&gt;', '<span class="overview-gap"></span>');
        } else {
          el.textContent = text;
        }
      }
    });
    document.querySelectorAll('.lang button').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById('btn-' + lang);
    if (btn) btn.classList.add('active');
    
    for (let i = 1; i <= 10; i++) {
      const screen = document.getElementById('screen' + i);
      if (screen) screen.src = `assets/checklist_${lang}_${i}.png`;
    }
  }

  function initLang(defaultLang='ru') {
    const stored = localStorage.getItem('lang');
    setLang(stored || defaultLang);

    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
      document.getElementById('btn-theme').textContent = '☀️';
    }
  }

  document.addEventListener('DOMContentLoaded', () => initLang('ru'));
</script>

</html>
